{% extends 'store/base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>BMI Calculator</h2>

    <form method="post" class="mt-3">
        {% csrf_token %}


        <div class="mb-3">
            <label for="weight" class="form-label">Weight (kg)</label>
            <input type="number" step="0.1" name="weight" id="weight" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="height" class="form-label">Height (cm)</label>
            <input type="number" step="0.1" name="height" id="height" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary">Calculate</button>
    </form>


    
    {% if bmi %}
        <div class="alert alert-info mt-4">
            <strong>Your BMI:</strong> {{ bmi }}<br>
            <strong>Result:</strong> {{ category }}
        </div>
    {% endif %}

    {% if category == "Invalid data" %}
        <div class="alert alert-danger mt-4">
            Please enter correct data.
        </div>
    {% endif %}
</div>
{% endblock %}
