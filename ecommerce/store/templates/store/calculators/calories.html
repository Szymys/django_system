{% extends 'store/base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Calorie Calculator</h2>

    <form method="post" class="mt-3">
        {% csrf_token %}



        <div class="mb-3">
            <label for="sex" class="form-label">Sex</label>
            <select name="sex" id="sex" class="form-select" required>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>


        <div class="mb-3">
            <label for="age" class="form-label">Age</label>
            <input type="number" name="age" id="age" class="form-control" required>
        </div>


        <div class="mb-3">
            <label for="weight" class="form-label">Weight (kg)</label>
            <input type="number" step="0.1" name="weight" id="weight" class="form-control" required>
        </div>


        <div class="mb-3">
            <label for="height" class="form-label">Height (cm)</label>
            <input type="number" step="0.1" name="height" id="height" class="form-control" required>
        </div>


        <div class="mb-3">
            <label for="activity" class="form-label">Activity Level</label>
            <select name="activity" id="activity" class="form-select" required>
                <option value="low">Low activity</option>
                <option value="medium">Medium activity</option>
                <option value="high">High activity</option>
            </select>
        </div>

        
        <button type="submit" class="btn btn-primary">Calculate</button>
    </form>

    {% if calories %}
        <div class="alert alert-success mt-4">
            <strong>Your daily calories:</strong> {{ calories }} kcal
        </div>
    {% endif %}
</div>
{% endblock %}
